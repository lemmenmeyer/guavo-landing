<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" shape-rendering="geometricPrecision">
  <!-- Dark green outer ring -->
  <circle cx="100" cy="100" r="90" fill="#003E28"/>
  <!-- Cream / pink inner ring -->
  <circle cx="100" cy="100" r="79" fill="#FDC6B2"/>
  <!-- Coral center -->
  <circle cx="100" cy="100" r="67" fill="#F07563"/>
  <!-- 6 seeds at 60° intervals; measured from original pixels -->
  <g fill="#FDBE57">
    <ellipse cx="100" cy="67.83" rx="6.24" ry="13.31"/>
    <g transform="rotate(60 100 100)"><ellipse cx="100" cy="67.83" rx="6.24" ry="13.31"/></g>
    <g transform="rotate(120 100 100)"><ellipse cx="100" cy="67.83" rx="6.24" ry="13.31"/></g>
    <g transform="rotate(180 100 100)"><ellipse cx="100" cy="67.83" rx="6.24" ry="13.31"/></g>
    <g transform="rotate(240 100 100)"><ellipse cx="100" cy="67.83" rx="6.24" ry="13.31"/></g>
    <g transform="rotate(300 100 100)"><ellipse cx="100" cy="67.83" rx="6.24" ry="13.31"/></g>
  </g>
</svg>
